<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jeff + Noor — Summer/Fall 2026</title>
<style>
  :root {
    --bg: #ffffff;
    --ink: #1d1d1f;
    --ink-2: rgba(29,29,31,0.6);
    --ink-3: rgba(29,29,31,0.42);
    --divider: rgba(29,29,31,0.08);
    --accent: #0071e3;
    --warn: #c11e25;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 48px 22px 96px; }

  header { margin-bottom: 44px; }
  h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.022em; margin: 0 0 4px; line-height: 1.15; }
  .subtitle { color: var(--ink-3); font-size: 14px; font-weight: 400; }

  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-3); font-weight: 600; }

  /* Basecamp */
  .bc { padding: 28px 22px; border-radius: 18px; margin-bottom: 18px; background: rgba(29,29,31,0.03); }
  .bc.active { background: linear-gradient(180deg, rgba(0,113,227,0.08) 0%, rgba(0,113,227,0.02) 80%); box-shadow: 0 1px 0 rgba(29,29,31,0.04), inset 0 0 0 1px rgba(0,113,227,0.12); }
  .bc.upcoming { background: rgba(29,29,31,0.04); box-shadow: inset 0 0 0 1px rgba(29,29,31,0.06); }
  .bc.past { background: transparent; box-shadow: inset 0 0 0 1px var(--divider); }
  .bc.past .bc-name, .bc.past .bc-where, .bc.past .bc-note { color: var(--ink-3); }
  .bc-status { display: inline-flex; align-items: center; gap: 7px; margin-bottom: 14px; padding: 5px 10px 5px 9px; background: var(--bg); border-radius: 999px; box-shadow: 0 0 0 1px var(--divider); }
  .bc.active .bc-status { background: var(--accent); box-shadow: none; }
  .bc.active .bc-status .label { color: white; }
  .bc.upcoming .bc-status .label { color: var(--ink-2); }
  .bc.past .bc-status .label { color: var(--ink-3); }
  .bc-status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .bc.active .bc-status .dot { background: white; animation: pulse 1.8s infinite ease-in-out; }
  .bc.upcoming .bc-status .dot { background: var(--ink-2); }
  .bc.past .bc-status .dot { background: var(--ink-3); }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1 } 50% { transform: scale(1.35); opacity: 0.5 } }

  .bc-name { font-size: 30px; font-weight: 700; letter-spacing: -0.022em; line-height: 1.1; margin: 0 0 6px; }
  .bc-when { font-size: 15px; color: var(--ink-2); font-variant-numeric: tabular-nums; margin-bottom: 4px; }
  .bc-where { font-size: 15px; color: var(--ink-2); margin-bottom: 6px; }
  .bc-note { font-size: 14px; color: var(--ink-3); margin-bottom: 0; }
  .bc-countdown { font-size: 13px; color: var(--ink-3); margin-top: 10px; font-variant-numeric: tabular-nums; }

  .bc-sec { margin-top: 28px; }
  .bc-sec .label { margin-bottom: 14px; display: block; }

  .row { padding: 12px 0; border-top: 1px solid var(--divider); display: flex; gap: 14px; align-items: flex-start; }
  .row:last-child { border-bottom: 1px solid var(--divider); }
  .row-when { flex: 0 0 90px; font-size: 13px; color: var(--ink-3); font-variant-numeric: tabular-nums; padding-top: 1px; }
  .row-body { flex: 1; min-width: 0; }
  .row-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.35; }
  .row-title .tentative { font-size: 11px; font-weight: 500; color: var(--ink-3); margin-left: 6px; vertical-align: middle; text-transform: lowercase; letter-spacing: 0; }
  .row-note { font-size: 13px; color: var(--ink-3); margin-top: 4px; line-height: 1.45; }
  .row-links { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
  .row-links a { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--accent); text-decoration: none; padding: 3px 8px; border-radius: 6px; background: rgba(0,113,227,0.08); }
  .row-links a:hover { background: rgba(0,113,227,0.14); }
  .row-links a::after { content: "↗"; font-size: 10px; opacity: 0.7; }
  .bc-links { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .bc-links a { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: var(--accent); text-decoration: none; padding: 5px 10px; border-radius: 7px; background: rgba(0,113,227,0.08); font-weight: 500; }
  .bc-links a:hover { background: rgba(0,113,227,0.14); }
  .bc-links a::after { content: "↗"; font-size: 11px; opacity: 0.7; }

  /* In-transit */
  .transit { padding: 28px 0; border-top: 1px solid var(--divider); }
  .transit .label { margin-bottom: 14px; display: block; }
  .transit-route { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 14px; color: var(--ink); }

  /* Lodging chip */
  .lodging { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; background: rgba(29,29,31,0.06); color: var(--ink-2); font-weight: 500; vertical-align: middle; }
  .lodging.airbnb { background: rgba(255, 56, 92, 0.10); color: #b8264a; }
  .lodging.tope { background: rgba(180, 83, 9, 0.10); color: #92400e; }
  .lodging.festival { background: rgba(147, 51, 234, 0.10); color: #6b21a8; }
  .lodging.cottage { background: rgba(22, 163, 74, 0.10); color: #15803d; }
  .lodging.hotel { background: rgba(0, 113, 227, 0.10); color: #0855a3; }
  .lodging.friends { background: rgba(234, 88, 12, 0.10); color: #9a3412; }
  .bc-lodging { margin-bottom: 8px; }

  /* Solo */
  .solo { padding: 36px 0; border-top: 1px solid var(--divider); }
  .solo .label { margin-bottom: 14px; display: block; }
  .solo h3 { font-size: 24px; font-weight: 700; letter-spacing: -0.018em; margin: 0 0 18px; }

  footer { color: var(--ink-3); font-size: 12px; margin-top: 56px; text-align: center; }

  @media (min-width: 640px) {
    h1 { font-size: 40px; }
    .bc-name { font-size: 36px; }
  }
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Summer / Fall 2026</h1>
  <div class="subtitle">Jeff + Noor. Snapshot as of May 10.</div>
</header>

<main id="main"></main>

<footer>Updated by Wanda</footer>
</div>

<script>
const TODAY = "2026-05-10";
const today = new Date(TODAY + "T00:00:00Z");
const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const basecamps = [
  {
    name: "Joshua Tree",
    start: "2026-05-10",
    end: "2026-06-03",
    where: "Airbnb on Olympic Rd",
    lodging: { type: "airbnb", label: "Airbnb" },
    note: "Tope, Banjo, Bakso. Pool guy: Cameron.",
    visitors: [
      { name: "Sarah", start: "2026-05-16", end: "2026-05-20", note: "Flies into PSP, stays at the Airbnb, out via PSP morning of May 20.", lodging: { type: "airbnb", label: "Same Airbnb" } }
    ],
    trips: [
      { name: "Noor — Packard talk", start: "2026-05-20", end: "2026-05-20", tentative: false, note: "Day trip, Los Altos. PSP → SJC." },
      { name: "Lightning in a Bottle", start: "2026-05-20", end: "2026-05-24", tentative: false, note: "Buena Vista Lake. Dogs boarded near JT. Exit Mon May 25.", lodging: { type: "festival", label: "Festival camping" } }
    ],
    events: []
  },
  {
    name: "Portland",
    start: "2026-06-13",
    end: null,
    where: "Lodging TBD",
    lodging: { type: "default", label: "Lodging TBD" },
    note: "Arrival mid-June. Length open.",
    visitors: [],
    trips: [
      { name: "Camp Cedar Creek", start: "2026-07-04", end: "2026-07-04", tentative: true, note: "4th of July campout. Location TBD.", lodging: { type: "tope", label: "Tope camping" } },
      { name: "Ontario Cottage", start: "2026-07-06", end: "2026-07-12", tentative: true, note: "Cottage country in Canada, right after the 4th. Both joining. PDX → YYZ + drive. Dates are a placeholder, confirm.", lodging: { type: "cottage", label: "Cottage rental" } }
    ],
    events: []
  }
];

const transit = [
  {
    route: "Joshua Tree → Portland",
    start: "2026-06-04",
    end: "2026-06-12",
    stops: [
      { name: "Kift Reunion", start: "2026-06-05", end: "2026-06-08", tentative: true, note: "Location TBD.", lodging: { type: "tope", label: "Tope camping" } },
      { name: "Sierras (Tope drive)", start: "2026-06-08", end: "2026-06-12", tentative: false, note: "Route TBD: east 395 (Mammoth, Alabama Hills, Mono Lake) or west (Yosemite east, Sonora Pass).", lodging: { type: "tope", label: "Tope camping" } }
    ]
  }
];

const solos = [
  { name: "Brazil", start: "2026-06-08", end: "2026-06-13", tentative: true, note: "Possibly happening. Peels off mid-Sierras, regroups with Jeff after Jun 13." },
  { name: "Europe", start: "2026-07-01", end: "2026-07-31", tentative: true, note: "From the citizenship tracker, status \"likely\". Destination TBD. Noor pops back ~Jul 5 to join the Ontario Cottage trip." },
  { name: "Africa", start: "2026-10-01", end: "2026-10-31", tentative: true, note: "From the citizenship tracker, status \"likely\". Destination TBD." }
];

function parseUTC(s) { return new Date(s + "T00:00:00Z"); }
function fmtRange(s, e) {
  const sd = parseUTC(s);
  const sm = monthNames[sd.getUTCMonth()];
  const sdd = sd.getUTCDate();
  if (!e) return `From ${sm} ${sdd}`;
  const ed = parseUTC(e);
  const em = monthNames[ed.getUTCMonth()];
  const edd = ed.getUTCDate();
  if (s === e) return `${sm} ${sdd}`;
  if (sm === em) return `${sm} ${sdd}–${edd}`;
  return `${sm} ${sdd} – ${em} ${edd}`;
}
function fmtShortRange(s, e) {
  const sd = parseUTC(s);
  const sm = monthNames[sd.getUTCMonth()];
  const sdd = sd.getUTCDate();
  if (!e) return `${sm} ${sdd}`;
  const ed = parseUTC(e);
  const em = monthNames[ed.getUTCMonth()];
  const edd = ed.getUTCDate();
  if (s === e) return `${sm} ${sdd}`;
  if (sm === em) return `${sm} ${sdd}–${edd}`;
  return `${sm} ${sdd}–${em} ${edd}`;
}
function daysBetween(a, b) { return Math.round((b - a) / 86400000); }

function bcStatus(bc) {
  const s = parseUTC(bc.start);
  const e = bc.end ? parseUTC(bc.end) : null;
  if (today < s) return "upcoming";
  if (!e || today <= e) return "active";
  return "past";
}

function renderLinks(links, cls) {
  if (!links || !links.length) return "";
  return `<div class="${cls}">${links.map(l => `<a href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`).join("")}</div>`;
}

function lodgingChip(l) {
  if (!l) return "";
  return `<span class="lodging ${l.type}">${l.label}</span>`;
}

function row(item) {
  return `
    <div class="row">
      <div class="row-when">${fmtShortRange(item.start, item.end)}</div>
      <div class="row-body">
        <div class="row-title">${item.name}${item.tentative ? ` <span class="tentative">tentative</span>` : ""} ${lodgingChip(item.lodging)}</div>
        ${item.note ? `<div class="row-note">${item.note}</div>` : ""}
        ${renderLinks(item.links, "row-links")}
      </div>
    </div>`;
}

function renderBasecamp(bc) {
  const status = bcStatus(bc);
  let statusLabel = "";
  let countdown = "";
  if (status === "active") {
    statusLabel = `<div class="bc-status"><span class="dot"></span><span class="label">Active basecamp</span></div>`;
    if (bc.end) {
      const left = daysBetween(today, parseUTC(bc.end));
      countdown = `<div class="bc-countdown">${left} days left here</div>`;
    }
  } else if (status === "upcoming") {
    statusLabel = `<div class="bc-status"><span class="dot"></span><span class="label">Next basecamp</span></div>`;
    const inDays = daysBetween(today, parseUTC(bc.start));
    countdown = `<div class="bc-countdown">In ${inDays} days</div>`;
  } else {
    statusLabel = `<div class="bc-status"><span class="dot"></span><span class="label">Past basecamp</span></div>`;
  }

  let inside = "";
  if (bc.visitors.length) {
    inside += `<div class="bc-sec"><div class="label">Visitors</div>${bc.visitors.map(row).join("")}</div>`;
  }
  if (bc.trips.length) {
    inside += `<div class="bc-sec"><div class="label">Trips from base</div>${bc.trips.map(row).join("")}</div>`;
  }
  if (bc.events.length) {
    inside += `<div class="bc-sec"><div class="label">Local events</div>${bc.events.map(row).join("")}</div>`;
  }

  return `
    <section class="bc ${status}">
      ${statusLabel}
      <h2 class="bc-name">${bc.name}</h2>
      <div class="bc-when">${fmtRange(bc.start, bc.end)}</div>
      <div class="bc-where">${bc.where}</div>
      ${bc.lodging ? `<div class="bc-lodging">${lodgingChip(bc.lodging)}</div>` : ""}
      ${bc.note ? `<div class="bc-note">${bc.note}</div>` : ""}
      ${renderLinks(bc.links, "bc-links")}
      ${countdown}
      ${inside}
    </section>`;
}

function renderTransit(mv) {
  return `
    <section class="transit">
      <div class="label">In-transit &middot; ${fmtRange(mv.start, mv.end)}</div>
      <div class="transit-route">${mv.route}</div>
      ${mv.stops.map(row).join("")}
    </section>`;
}

function renderSolo() {
  return `
    <section class="solo">
      <div class="label">Solo</div>
      <h3>Noor's trips</h3>
      ${solos.map(row).join("")}
    </section>`;
}

const main = document.getElementById("main");
main.innerHTML = `
  ${renderBasecamp(basecamps[0])}
  ${transit.map(renderTransit).join("")}
  ${renderBasecamp(basecamps[1])}
  ${renderSolo()}
`;
</script>
</body>
</html>
