<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jeff + Noor — Summer/Fall 2026</title>
<style>
  :root {
    --bg: #faf8f5;
    --card: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6863;
    --line: #e7e3dc;
    --base: #2563eb;
    --event: #16a34a;
    --travel: #ea580c;
    --festival: #9333ea;
    --tentative: #94a3b8;
    --warn: #b91c1c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.45;
    -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }
  header { margin-bottom: 20px; }
  h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: -0.01em; }
  .subtitle { color: var(--muted); font-size: 13px; }

  /* Tiny year ribbon (Gantt overview) */
  .ribbon { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin: 16px 0 24px; }
  .ribbon h3 { margin: 0 0 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }
  .ribbon-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .ribbon-inner { min-width: 600px; position: relative; }
  .axis { display: grid; grid-template-columns: repeat(8, 1fr); font-size: 10px; color: var(--muted); border-bottom: 1px solid var(--line); padding-bottom: 4px; margin-bottom: 6px; }
  .axis span { text-align: left; }
  .bars { display: flex; flex-direction: column; gap: 4px; position: relative; }
  .bar-row { position: relative; height: 14px; }
  .bar { position: absolute; height: 100%; border-radius: 3px; }
  .bar.base { background: var(--base); }
  .bar.event { background: var(--event); }
  .bar.travel { background: var(--travel); }
  .bar.festival { background: var(--festival); }
  .bar.tentative { background: var(--tentative); opacity: 0.85; }
  .today-line { position: absolute; top: 0; bottom: 0; width: 0; border-left: 2px dashed var(--warn); z-index: 2; }
  .today-label { position: absolute; top: -16px; transform: translateX(-50%); font-size: 9px; color: var(--warn); font-weight: 600; white-space: nowrap; }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 10px 14px; margin: 12px 0 0; font-size: 12px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); }
  .legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

  /* Agenda */
  .month-block { margin-bottom: 24px; }
  .month-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; margin: 0 0 10px; padding-left: 4px; }
  .event-card { background: var(--card); border: 1px solid var(--line); border-left-width: 4px; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
  .event-card.base { border-left-color: var(--base); }
  .event-card.event { border-left-color: var(--event); }
  .event-card.travel { border-left-color: var(--travel); }
  .event-card.festival { border-left-color: var(--festival); }
  .event-card.tentative { border-left-color: var(--tentative); }
  .event-card.warn { border-left-color: var(--warn); }
  .ec-head { display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px 10px; }
  .ec-when { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; font-weight: 500; }
  .ec-title { font-size: 15px; font-weight: 600; }
  .ec-tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 3px; color: white; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .ec-tag.base { background: var(--base); }
  .ec-tag.event { background: var(--event); }
  .ec-tag.travel { background: var(--travel); }
  .ec-tag.festival { background: var(--festival); }
  .ec-tag.tentative { background: var(--tentative); }
  .ec-note { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .conflict { background: #fef2f2; border-left-color: var(--warn); padding: 10px 14px; border-radius: 8px; margin: 4px 0 8px; font-size: 12px; color: var(--warn); border: 1px solid #fee2e2; border-left-width: 4px; }
  .conflict strong { font-weight: 700; }

  footer { color: var(--muted); font-size: 12px; margin-top: 32px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Jeff + Noor &mdash; Summer/Fall 2026</h1>
  <div class="subtitle">Snapshot as of 2026-05-10. Some legs still tentative.</div>
</header>

<section class="ribbon" id="ribbon-section">
  <h3>Overview — May to Dec 2026</h3>
  <div class="ribbon-scroll">
    <div class="ribbon-inner" id="ribbon-inner">
      <div class="axis" id="ribbon-axis"></div>
      <div class="bars" id="ribbon-bars"></div>
    </div>
  </div>
  <div class="legend">
    <span><i style="background:var(--base)"></i> Base</span>
    <span><i style="background:var(--festival)"></i> Festival</span>
    <span><i style="background:var(--event)"></i> Event</span>
    <span><i style="background:var(--travel)"></i> Travel</span>
    <span><i style="background:var(--tentative)"></i> Tentative</span>
  </div>
</section>

<div id="agenda"></div>

<footer>Generated by Wanda. Ping me to update.</footer>
</div>

<script>
const events = [
  { name: "Joshua Tree base",      start: "2026-05-10", end: "2026-06-03", type: "base",      note: "Airbnb on Olympic Rd. Tope, Banjo, Bakso. Pool guy: Cameron." },
  { name: "Sarah visits",          start: "2026-05-16", end: "2026-05-20", type: "event",     note: "Flies into PSP, crashes at the JT Airbnb, out via PSP morning of May 20." },
  { name: "Noor — Packard talk",   start: "2026-05-20", end: "2026-05-20", type: "event",     note: "Speaking at the Packard Foundation, Los Altos. PSP → SJC." },
  { name: "Lightning in a Bottle", start: "2026-05-20", end: "2026-05-24", type: "festival",  note: "Memorial Day weekend, Buena Vista Lake. Banjo + Bakso boarded near JT. Exit Mon May 25." },
  { name: "JT Airbnb (back)",      start: "2026-05-25", end: "2026-06-03", type: "base",      note: "Wind-down before the next leg." },
  { name: "Canada Cottage",        start: "2026-06-01", end: "2026-06-05", type: "tentative", note: "Dates and location TBD. Likely collides with Kift / Sierras / Brazil." },
  { name: "Kift Reunion",          start: "2026-06-05", end: "2026-06-08", type: "tentative", note: "Location TBD. Routing JT → reunion → Sierras." },
  { name: "Sierras leg",           start: "2026-06-08", end: "2026-06-12", type: "travel",    note: "Tope drive. Route TBD: east 395 (Mammoth, Alabama Hills, Mono Lake) vs west (Yosemite east, Sonora Pass)." },
  { name: "Noor — Brazil",         start: "2026-06-08", end: "2026-06-13", type: "tentative", note: "Possibly happening. Peels off mid-Sierras, regroups with Jeff Jun 13+ en route to Portland." },
  { name: "Portland",              start: "2026-06-13", end: "2026-06-30", type: "base",      note: "Arrival mid-June. Length and base TBD." },
  { name: "Camp Cedar Creek (4th)",start: "2026-07-04", end: "2026-07-04", type: "event",     note: "Location TBD. May collide with Noor's Jul Europe trip." },
  { name: "Noor — Europe",         start: "2026-07-01", end: "2026-07-31", type: "tentative", note: "From the citizenship tracker, status 'likely'. Destination TBD." },
  { name: "Noor — Africa",         start: "2026-10-01", end: "2026-10-31", type: "tentative", note: "From the citizenship tracker, status 'likely'. Destination TBD." },
];

const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const monthFullNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const TODAY = "2026-05-10";

const RIBBON_START = new Date(Date.UTC(2026, 4, 1));   // May 1
const RIBBON_END   = new Date(Date.UTC(2026, 11, 31)); // Dec 31
const totalDays = Math.round((RIBBON_END - RIBBON_START) / 86400000) + 1;

function parseUTC(s) { return new Date(s + "T00:00:00Z"); }
function dayIndex(d) { return Math.round((d - RIBBON_START) / 86400000); }
function pct(d) { return (dayIndex(d) / totalDays) * 100; }

// --- Build ribbon axis (8 months) ---
const axis = document.getElementById("ribbon-axis");
for (let m = 4; m <= 11; m++) axis.innerHTML += `<span>${monthNames[m]}</span>`;

// --- Build ribbon bars ---
const ribbonBars = document.getElementById("ribbon-bars");
events.forEach(ev => {
  const left = pct(parseUTC(ev.start));
  const right = pct(parseUTC(ev.end)) + (1 / totalDays) * 100;
  const row = document.createElement("div");
  row.className = "bar-row";
  row.innerHTML = `<div class="bar ${ev.type}" style="left:${left}%;width:${right - left}%" title="${ev.name}"></div>`;
  ribbonBars.appendChild(row);
});

// --- Today marker ---
const todayPct = pct(parseUTC(TODAY));
const todayLine = document.createElement("div");
todayLine.className = "today-line";
todayLine.style.left = todayPct + "%";
todayLine.innerHTML = `<div class="today-label" style="left:0">Today</div>`;
document.getElementById("ribbon-inner").appendChild(todayLine);

// --- Build agenda grouped by month ---
function fmtRange(s, e) {
  const sd = parseUTC(s), ed = parseUTC(e);
  const sm = monthNames[sd.getUTCMonth()];
  const em = monthNames[ed.getUTCMonth()];
  const sdd = sd.getUTCDate(), edd = ed.getUTCDate();
  if (s === e) return `${sm} ${sdd}`;
  if (sm === em) return `${sm} ${sdd}–${edd}`;
  return `${sm} ${sdd} – ${em} ${edd}`;
}

const byMonth = {};
events.forEach(ev => {
  const m = parseUTC(ev.start).getUTCMonth();
  if (!byMonth[m]) byMonth[m] = [];
  byMonth[m].push(ev);
});

// detect overlaps in a month (excluding base trips overlapping with shorter events, which is expected)
function overlapsInMonth(monthEvents) {
  const conflicts = [];
  for (let i = 0; i < monthEvents.length; i++) {
    for (let j = i + 1; j < monthEvents.length; j++) {
      const a = monthEvents[i], b = monthEvents[j];
      if (a.type === "base" || b.type === "base") continue;
      const as = parseUTC(a.start), ae = parseUTC(a.end);
      const bs = parseUTC(b.start), be = parseUTC(b.end);
      if (as <= be && bs <= ae) conflicts.push([a.name, b.name]);
    }
  }
  return conflicts;
}

const agenda = document.getElementById("agenda");
Object.keys(byMonth).sort((a,b) => a-b).forEach(mKey => {
  const m = parseInt(mKey, 10);
  const block = document.createElement("div");
  block.className = "month-block";
  block.innerHTML = `<h2 class="month-label">${monthFullNames[m]} 2026</h2>`;

  const conflicts = overlapsInMonth(byMonth[m]);
  if (conflicts.length > 0) {
    const uniq = [...new Set(conflicts.map(c => c.join(" + ")))];
    const c = document.createElement("div");
    c.className = "conflict";
    c.innerHTML = `<strong>Overlap watch:</strong> ${uniq.join("; ")}`;
    block.appendChild(c);
  }

  byMonth[m].sort((a,b) => parseUTC(a.start) - parseUTC(b.start)).forEach(ev => {
    const card = document.createElement("div");
    card.className = `event-card ${ev.type}`;
    card.innerHTML = `
      <div class="ec-head">
        <span class="ec-tag ${ev.type}">${ev.type}</span>
        <span class="ec-when">${fmtRange(ev.start, ev.end)}</span>
        <span class="ec-title">${ev.name}</span>
      </div>
      <div class="ec-note">${ev.note}</div>
    `;
    block.appendChild(card);
  });

  agenda.appendChild(block);
});
</script>
</body>
</html>
