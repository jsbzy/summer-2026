  if (s === e) return `${sm} ${sdd}`;
  if (sm === em) return `${sm} ${sdd}–${edd}`;
  return `${sm} ${sdd} – ${em} ${edd}`;
}
function fmtShortRange(s, e) {
  const sd = parseUTC(s);
  const sm = monthNames[sd.getUTCMonth()];
  const sdd = sd.getUTCDate();
  if (!e) return `${sm} ${sdd}`;
  const ed = parseUTC(e);
  const em = monthNames[ed.getUTCMonth()];
  const edd = ed.getUTCDate();
  if (s === e) return `${sm} ${sdd}`;
  if (sm === em) return `${sm} ${sdd}–${edd}`;
  return `${sm} ${sdd}–${em} ${edd}`;
}
function daysBetween(a, b) { return Math.round((b - a) / 86400000); }

function bcStatus(bc) {
  const s = parseUTC(bc.start);
  const e = bc.end ? parseUTC(bc.end) : null;
  if (today < s) return "upcoming";
  if (!e || today <= e) return "active";
  return "past";
}

function renderLinks(links, cls) {
  if (!links || !links.length) return "";
  return `<div class="${cls}">${links.map(l => `<a href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`).join("")}</div>`;
}

function lodgingChip(l) {
  if (!l) return "";
  return `<span class="lodging ${l.type}">${l.label}</span>`;
}

function isItemPast(item) {
  if (!item.end) return false;
  return parseUTC(item.end) < today;
}

function row(item, opts) {
  const past = isItemPast(item);
  const cls = past ? "row past" : "row";
  const doneBadge = past ? ` <span class="done">done</span>` : "";
  return `
    <div class="${cls}">
      <div class="row-when">${fmtShortRange(item.start, item.end)}</div>
      <div class="row-body">
        <div class="row-title">${item.name}${item.tentative ? ` <span class="tentative">tentative</span>` : ""}${doneBadge} ${lodgingChip(item.lodging)}</div>
        ${item.note ? `<div class="row-note">${item.note}</div>` : ""}
        ${renderLinks(item.links, "row-links")}
      </div>
    </div>`;
}

function renderBasecamp(bc) {
  const status = bcStatus(bc);
  let statusLabel = "";
  let countdown = "";
  if (status === "active") {
    statusLabel = `<div class="bc-status"><span class="dot"></span><span class="label">Active basecamp</span></div>`;
    if (bc.end) {
      const left = daysBetween(today, parseUTC(bc.end));
      countdown = `<div class="bc-countdown">${left} days left here</div>`;
    }
  } else if (status === "upcoming") {
    statusLabel = `<div class="bc-status"><span class="dot"></span><span class="label">Next basecamp</span></div>`;
    const inDays = daysBetween(today, parseUTC(bc.start));
    countdown = `<div class="bc-countdown">In ${inDays} days</div>`;
  } else {
    statusLabel = `<div class="bc-status"><span class="dot"></span><span class="label">Past basecamp</span></div>`;
  }

  // Split each sub-collection into upcoming (or active) vs past, so past
  // items can be collapsed into the archive at the bottom of the card.
  const splitItems = (arr) => {
    const upcoming = [], past = [];
    arr.forEach(it => (isItemPast(it) ? past : upcoming).push(it));
    return { upcoming, past };
  };
  const visitorsSplit = splitItems(bc.visitors);
  const tripsSplit    = splitItems(bc.trips);
  const eventsSplit   = splitItems(bc.events);

  let inside = "";
  if (visitorsSplit.upcoming.length) {
    inside += `<div class="bc-sec"><div class="label">Visitors</div>${visitorsSplit.upcoming.map(row).join("")}</div>`;
  }
  if (tripsSplit.upcoming.length) {
    inside += `<div class="bc-sec"><div class="label">Trips from base</div>${tripsSplit.upcoming.map(row).join("")}</div>`;
  }
  if (eventsSplit.upcoming.length) {
    inside += `<div class="bc-sec"><div class="label">Local events</div>${eventsSplit.upcoming.map(row).join("")}</div>`;
  }

  const archive = [...visitorsSplit.past, ...tripsSplit.past, ...eventsSplit.past]
    .sort((a, b) => parseUTC(a.start) - parseUTC(b.start));
  if (archive.length) {
    inside += `<details class="archive"><summary>Done at this base · ${archive.length}</summary>${archive.map(row).join("")}</details>`;
  }

  return `
    <section class="bc ${status}">
      ${statusLabel}
      <h2 class="bc-name">${bc.name}</h2>
      <div class="bc-when">${fmtRange(bc.start, bc.end)}</div>
      <div class="bc-where">${bc.where}</div>
      ${bc.lodging ? `<div class="bc-lodging">${lodgingChip(bc.lodging)}</div>` : ""}
      ${bc.note ? `<div class="bc-note">${bc.note}</div>` : ""}
      ${renderLinks(bc.links, "bc-links")}
      ${countdown}
      ${inside}
    </section>`;
}

function renderTransit(mv) {
  return `
    <section class="transit">
      <div class="label">In-transit &middot; ${fmtRange(mv.start, mv.end)}</div>
      <div class="transit-route">${mv.route}</div>
      ${mv.stops.map(row).join("")}
    </section>`;
}

function renderSolo() {
  return `
    <section class="solo">
      <div class="label">Solo</div>
      <h3>Noor's trips</h3>
      ${solos.map(row).join("")}
    </section>`;
}

function renderCouples() {
  if (!couples.length) return "";
  return `
    <section class="solo">
      <div class="label">Together &middot; Jeff + Noor</div>
      <h3>Joint trips</h3>
      ${couples.map(row).join("")}
    </section>`;
}

function renderBrazilTimeline() {
  if (!brazilTimeline.length) return "";
  const now = new Date();
  // Sort by iso for safety
  const sorted = brazilTimeline.slice().sort((a, b) => new Date(a.iso) - new Date(b.iso));
  // Find the "now" position: the latest event whose time is <= now, AND mark the next upcoming one as "current focus"
  let doneCount = 0;
  sorted.forEach(ev => { if (new Date(ev.iso) <= now) doneCount++; });
  // Mark done / now / upcoming
  const rendered = sorted.map((ev, idx) => {
    const evTime = new Date(ev.iso);
    let status;
    if (evTime <= now) status = "done";
    else if (idx === doneCount) status = "now"; // first upcoming = focus
    else status = "upcoming";
    return `
      <div class="ev ${status}">
        <div class="ev-when">${ev.tzLabel}</div>
        <div class="ev-body">
          <div class="ev-title"><span class="status-dot"></span>${ev.title}</div>
          ${ev.detail ? `<div class="ev-detail">${ev.detail}</div>` : ""}
        </div>
      </div>`;
  }).join("");
  const total = sorted.length;
  return `
    <section class="briazil">
      <div class="label">Brazil trip log</div>
      <h3>Imperatriz + Rio · Jun 6 → Jun 14</h3>
      <div class="briazil-sub">${doneCount} of ${total} milestones done. Times shown in local time of the event.</div>
      ${rendered}
    </section>`;
}

// Snapshot date stamp in the header.
(function setSubtitle() {
  const el = document.getElementById("subtitle");
  if (!el) return;
  const [y, m, d] = SNAPSHOT_STAMP_YMD.split("-").map(Number);
  el.textContent = `Jeff + Noor. Snapshot as of ${fullMonthNames[m - 1]} ${d}, ${y}.`;
})();

const main = document.getElementById("main");
main.innerHTML = `
  ${renderBrazilTimeline()}
  ${renderBasecamp(basecamps[0])}
  ${renderTransit(transit[0])}
  ${renderCouples()}
  ${renderTransit(transit[1])}
  ${renderBasecamp(basecamps[1])}
  ${renderSolo()}
`;
</script>
